<!DOCTYPE html>
<html>
<body>
    <script>
        // Yêu cầu 1
        console.log("Các số từ 1 đến 20");
        for (let i = 1; i <= 20; i++) {
            console.log(i);
        }

        // Yêu cầu 2
        console.log("Tổng các số từ 1 đến 20");
        let tong = 0;
        for (let i = 1; i <= 20; i++) {
            tong += i;
        }
        console.log("Tổng là: " + tong);

        // Yêu cầu 3
        console.log("Các số chẵn từ 1 đến 20");
        for (let i = 1; i <= 20; i++) {
            if (i % 2 === 0) {
                console.log(i);
            }
        }
    </script>
</body>
</html>
