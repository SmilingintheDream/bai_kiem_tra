<!DOCTYPE html>
<html>
<body>
    <h1>Mở Console để xem kết quả</h1>
    
    <script>
        let diem = parseFloat(prompt("Nhập điểm của bạn:"));

        if (diem >= 8.0) {
            console.log("Giỏi");
        } else if (diem >= 6.5 && diem < 8.0) {
            console.log("Khá");
        } else if (diem >= 5.0 && diem < 6.5) {
            console.log("Trung bình");
        } else if (diem < 5.0) {
            console.log("Yếu");
        } else {
            console.log("Điểm không hợp lệ");
        }
    </script>
</body>
</html>
