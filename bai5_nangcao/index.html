<!DOCTYPE html>
<html>
<body>
    <script>
        let n = parseInt(prompt("Nhập số lượng phần tử n của mảng:"));
        let mangSoNguyen = [];

        for (let i = 0; i < n; i++) {
            let so = parseInt(prompt("Nhập phần tử thứ " + (i + 1) + ":"));
            mangSoNguyen.push(so);
        }

        function kiemTraSoNguyenTo(so) {
            if (so < 2) return false;
            for (let i = 2; i <= Math.sqrt(so); i++) {
                if (so % i === 0) return false;
            }
            return true;
        }

        let cacSoNguyenTo = [];
        let tongSoNguyenTo = 0;

        for (let i = 0; i < mangSoNguyen.length; i++) {
            if (kiemTraSoNguyenTo(mangSoNguyen[i])) {
                cacSoNguyenTo.push(mangSoNguyen[i]);
                tongSoNguyenTo += mangSoNguyen[i];
            }
        }
        
        console.log("Mảng bạn vừa nhập là: " + mangSoNguyen.join(", "));
        console.log("Các số nguyên tố có trong mảng: " + cacSoNguyenTo.join(", "));
        console.log("Tổng của các số nguyên tố đó: " + tongSoNguyenTo);
    </script>
</body>
</html>
